name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        if: github.repository == 'Terapi-Medya/bondlio-astro-adem'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server: ${{ secrets.FTP_SERVER }}
          port: 22
          local_path: './dist/*'
          remote_path: '/httpdocs'
          sftp_only: true
          delete_remote_files: false

      - name: Verify CSS is live
        if: github.repository == 'Terapi-Medya/bondlio-astro-adem'
        run: |
          css_path=$(curl -fsSL https://bondlio.com/ | grep -oE 'href="/_astro/[^"]+\.css"' | head -1 | sed 's/href="//;s/"//')
          test -n "$css_path"
          echo "Checking ${css_path}"
          curl -fsSI "https://bondlio.com${css_path}"
